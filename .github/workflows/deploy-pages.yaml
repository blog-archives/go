name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: quartz-lib/factory/.github/workflows/deploy-pages.yaml@master
    with:
      quartz-repository: quartz-lib/factory
      quartz-ref: master
      content-directory: "."
